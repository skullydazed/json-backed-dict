name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - none

jobs:
  bump-and-build:
    name: Bump version and build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Bump version
        if: inputs.bump != 'none'
        run: uv run hatch version ${{ inputs.bump }}

      - name: Get version
        id: get-version
        run: echo "version=$(uv run hatch version)" >> "$GITHUB_OUTPUT"

      - name: Commit and tag version bump
        if: inputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to v${{ steps.get-version.outputs.version }}"
          git tag "v${{ steps.get-version.outputs.version }}"
          git push origin HEAD --tags

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: bump-and-build
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
